<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a0533">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://api.iconify.design/twemoji:purple-heart.svg">
<title>Wordly 💜</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0221;
    --surface: #1e0940;
    --surface2: #2d1060;
    --accent: #c084fc;
    --accent2: #f0abfc;
    --gold: #fbbf24;
    --green: #34d399;
    --red: #f87171;
    --text: #f3e8ff;
    --text-dim: #a78bca;
    --border: rgba(192,132,252,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background stars */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(192,132,252,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(240,171,252,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 50% 80%, rgba(192,132,252,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 70%, rgba(251,191,36,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 60%, rgba(240,171,252,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 50%, rgba(192,132,252,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 65% 25%, rgba(251,191,36,0.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 16px 40px; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 0 16px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .streak-badge {
    display: flex; align-items: center; gap-5px;
    background: rgba(251,191,36,0.15);
    border: 1px solid rgba(251,191,36,0.3);
    border-radius: 20px; padding: 6px 12px;
    font-size: 0.85rem; font-weight: 600; color: var(--gold);
    gap: 4px;
  }
  .settings-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 50%; width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1rem; transition: all 0.2s;
  }
  .settings-btn:hover { background: var(--surface2); }

  /* Stats bar */
  .stats-bar {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 12px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .stat-label { font-size: 0.7rem; color: var(--text-dim); margin-top: 2px; }

  /* Progress ring */
  .progress-section { text-align: center; margin-bottom: 28px; }
  .progress-ring-wrap { position: relative; display: inline-block; }
  .progress-ring-wrap svg { transform: rotate(-90deg); }
  .progress-ring-bg { fill: none; stroke: var(--surface2); stroke-width: 8; }
  .progress-ring-fill {
    fill: none; stroke: url(#ringGrad); stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .progress-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .progress-pct {
    font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .progress-sub { font-size: 0.7rem; color: var(--text-dim); }

  /* Question card */
  .question-card {
    background: linear-gradient(145deg, var(--surface), var(--surface2));
    border: 1px solid var(--border);
    border-radius: 24px; padding: 28px 24px;
    margin-bottom: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    animation: slideUp 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .question-type {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-dim); margin-bottom: 16px;
  }
  .question-word {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem; font-weight: 700;
    text-align: center; margin: 12px 0;
    background: linear-gradient(135deg, var(--text), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1.1;
  }
  .question-hint {
    text-align: center; font-size: 0.8rem; color: var(--text-dim);
    margin-top: 8px;
  }

  /* Options */
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .option-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px; padding: 16px 12px;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500;
    color: var(--text); cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
    text-align: center; line-height: 1.3;
    position: relative; overflow: hidden;
  }
  .option-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    opacity: 0; transition: opacity 0.2s;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); transform: translateY(-2px); }
  .option-btn:hover:not(:disabled)::before { opacity: 0.07; }
  .option-btn.correct {
    border-color: var(--green); background: rgba(52,211,153,0.15);
    animation: correct-pulse 0.5s ease;
  }
  .option-btn.wrong {
    border-color: var(--red); background: rgba(248,113,113,0.15);
    animation: shake 0.4s ease;
  }
  .option-btn span { position: relative; z-index: 1; }
  @keyframes correct-pulse {
    0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); } 75% { transform: translateX(6px); }
  }

  /* Feedback card */
  .feedback-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 20px;
    margin-bottom: 20px;
    animation: slideUp 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  .feedback-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .feedback-icon { font-size: 1.4rem; }
  .feedback-title { font-weight: 600; font-size: 1rem; }
  .feedback-title.correct-text { color: var(--green); }
  .feedback-title.wrong-text { color: var(--red); }
  .feedback-sentence {
    background: rgba(192,132,252,0.08);
    border-left: 3px solid var(--accent);
    border-radius: 0 10px 10px 0;
    padding: 12px 14px; margin-bottom: 12px;
    font-style: italic; font-size: 0.9rem; line-height: 1.6;
    color: var(--accent2);
  }
  .feedback-explanation {
    font-size: 0.85rem; color: var(--text-dim); line-height: 1.6;
  }
  .feedback-loading {
    display: flex; align-items: center; gap: 10px;
    color: var(--text-dim); font-size: 0.85rem;
  }
  .spinner {
    width: 18px; height: 18px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Next button */
  .next-btn {
    width: 100%; padding: 18px;
    background: linear-gradient(135deg, #7c3aed, #a855f7, #c084fc);
    border: none; border-radius: 18px;
    font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
    color: white; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.5px;
    box-shadow: 0 8px 24px rgba(124,58,237,0.4);
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(124,58,237,0.5); }
  .next-btn:active { transform: translateY(0); }
  .next-btn.hidden {
    opacity: 0; pointer-events: none;
    /* reserve space so layout doesn't shift */
  }

  /* Notification banner */
  .notif-banner {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(251,191,36,0.1);
    border: 1px solid rgba(251,191,36,0.25);
    border-radius: 16px; padding: 14px 16px;
    margin-bottom: 16px; gap: 12px;
    animation: slideUp 0.4s ease;
  }
  .notif-banner-text { font-size: 0.82rem; color: var(--gold); line-height: 1.5; flex: 1; }
  .notif-allow-btn {
    background: rgba(251,191,36,0.2); border: 1px solid rgba(251,191,36,0.4);
    border-radius: 10px; padding: 8px 14px;
    font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 600;
    color: var(--gold); cursor: pointer; white-space: nowrap;
    transition: all 0.2s;
  }
  .notif-allow-btn:hover { background: rgba(251,191,36,0.3); }

  /* Level badge */
  .level-tag {
    display: inline-block; padding: 3px 10px;
    border-radius: 20px; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .level-A1 { background: rgba(52,211,153,0.2); color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
  .level-A2 { background: rgba(251,191,36,0.2); color: var(--gold); border: 1px solid rgba(251,191,36,0.3); }
  .level-B1 { background: rgba(192,132,252,0.2); color: var(--accent); border: 1px solid rgba(192,132,252,0.3); }
  .level-B2 { background: rgba(248,113,113,0.2); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }

  /* Settings modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px); z-index: 100;
    display: flex; align-items: flex-end; justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px 28px 0 0; padding: 28px 24px 40px;
    width: 100%; max-width: 480px;
    animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .modal-title {
    font-family: 'Playfair Display', serif; font-size: 1.4rem;
    margin-bottom: 20px;
  }
  .modal label { display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 6px; }
  .modal input {
    width: 100%; background: var(--bg);
    border: 1.5px solid var(--border); border-radius: 12px;
    padding: 12px 14px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    margin-bottom: 16px;
  }
  .modal input:focus { outline: none; border-color: var(--accent); }
  .modal-hint { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 20px; }
  .modal-hint a { color: var(--accent); text-decoration: none; }
  .modal-actions { display: flex; gap: 10px; }
  .btn-save {
    flex: 1; padding: 14px;
    background: linear-gradient(135deg, #7c3aed, #c084fc);
    border: none; border-radius: 14px;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600;
    color: white; cursor: pointer;
  }
  .btn-cancel {
    padding: 14px 20px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    color: var(--text); cursor: pointer;
  }

  /* Celebration */
  .celebration {
    text-align: center; padding: 40px 20px;
    animation: slideUp 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .celebration-emoji { font-size: 4rem; margin-bottom: 16px; }
  .celebration-title {
    font-family: 'Playfair Display', serif; font-size: 2rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .celebration-msg { color: var(--text-dim); margin-bottom: 24px; line-height: 1.6; }

  /* Weak words section */
  .section-title {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-dim); margin-bottom: 10px; margin-top: 4px;
  }
  .weak-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .weak-chip {
    background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25);
    border-radius: 20px; padding: 4px 12px;
    font-size: 0.8rem; color: var(--red);
  }
  .hidden { display: none !important; }
  .invisible { opacity: 0; pointer-events: none; transform: translateY(4px); transition: opacity 0.3s ease, transform 0.3s ease; }
  .next-btn:not(.invisible) { opacity: 1; pointer-events: auto; transform: translateY(0); transition: opacity 0.3s ease, transform 0.3s ease; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Wordly 💜</div>
    <div class="header-right">
      <div class="streak-badge">🔥 <span id="streakNum">0</span> gün</div>
      <div class="settings-btn" onclick="openSettings()">⚙️</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-num" id="statCorrect">0</div>
      <div class="stat-label">Doğru</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statSession">0</div>
      <div class="stat-label">Bu Oturum</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">Toplam</div>
    </div>
  </div>

  <!-- Notification prompt banner -->
  <div class="notif-banner hidden" id="notifBanner">
    <div class="notif-banner-text">🔔 Her gün saat 20:00'de hatırlatma almak ister misin?</div>
    <button class="notif-allow-btn" onclick="requestNotifPermission()">İzin Ver</button>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-ring-wrap">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#c084fc"/>
            <stop offset="100%" style="stop-color:#f0abfc"/>
          </linearGradient>
        </defs>
        <circle class="progress-ring-bg" cx="60" cy="60" r="52"/>
        <circle class="progress-ring-fill" id="ringFill" cx="60" cy="60" r="52"
          stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
      </svg>
      <div class="progress-center">
        <div class="progress-pct" id="progressPct">0%</div>
        <div class="progress-sub">başarı</div>
      </div>
    </div>
  </div>

  <!-- Weak words -->
  <div id="weakSection" class="hidden">
    <div class="section-title">⚠️ Tekrar edilmesi gerekenler</div>
    <div class="weak-list" id="weakList"></div>
  </div>

  <!-- Quiz area -->
  <div id="quizArea">
    <div class="question-card" id="questionCard">
      <div class="question-type" id="questionType"></div>
      <div style="text-align:center"><span class="level-tag" id="levelTag"></span></div>
      <div class="question-word" id="questionWord"></div>
      <div class="question-hint" id="questionHint"></div>
    </div>
    <div class="options" id="optionsGrid"></div>
    <div id="feedbackArea"></div>
    <button class="next-btn invisible" id="nextBtn" onclick="nextQuestion()">Sonraki Kelime →</button>
  </div>

  <!-- Celebration -->
  <div class="celebration hidden" id="celebrationArea">
    <div class="celebration-emoji" id="celebEmoji">🎉</div>
    <div class="celebration-title" id="celebTitle">Harika!</div>
    <div class="celebration-msg" id="celebMsg"></div>
    <button class="next-btn" onclick="restartQuiz()">Tekrar Oyna 🔄</button>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay hidden" id="settingsModal">
  <div class="modal">
    <div class="modal-title">⚙️ Ayarlar</div>
    <label>Groq API Key</label>
    <input type="password" id="apiKeyInput" placeholder="gsk_...">
    <div class="modal-hint">
      Ücretsiz API key için: <a href="https://console.groq.com" target="_blank">console.groq.com</a><br>
      Key olmadan da çalışır, sadece açıklama göstermez.
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSettings()">İptal</button>
      <button class="btn-save" onclick="saveSettings()">Kaydet</button>
    </div>
  </div>
</div>

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
let state = {
  sessionCorrect: 0,
  sessionTotal: 0,
  allTimeTotal: 0,
  allTimeCorrect: 0,
  streak: 0,
  lastPlayDate: null,
  wrongWords: {}, // word → count
  usedIndices: [],
  currentWord: null,
  currentMode: null, // 'en2tr' or 'tr2en'
  answered: false,
};

function loadState() {
  const s = localStorage.getItem('wordly_state');
  if (s) {
    const saved = JSON.parse(s);
    state.allTimeTotal = saved.allTimeTotal || 0;
    state.allTimeCorrect = saved.allTimeCorrect || 0;
    state.streak = saved.streak || 0;
    state.lastPlayDate = saved.lastPlayDate || null;
    state.wrongWords = saved.wrongWords || {};
  }
  // Update streak
  const today = new Date().toDateString();
  if (state.lastPlayDate !== today) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    if (state.lastPlayDate === yesterday.toDateString()) {
      // continue streak
    } else if (state.lastPlayDate !== today) {
      if (state.lastPlayDate !== null && state.lastPlayDate !== yesterday.toDateString()) {
        state.streak = 0;
      }
    }
  }
}

function saveState() {
  const today = new Date().toDateString();
  if (state.lastPlayDate !== today) {
    state.streak++;
    state.lastPlayDate = today;
  }
  localStorage.setItem('wordly_state', JSON.stringify({
    allTimeTotal: state.allTimeTotal,
    allTimeCorrect: state.allTimeCorrect,
    streak: state.streak,
    lastPlayDate: state.lastPlayDate,
    wrongWords: state.wrongWords,
  }));
}

// ──────────────────────────────────────────────
// QUIZ LOGIC
// ──────────────────────────────────────────────
function getNextWord() {
  // Prioritize wrong words
  const wrongEntries = Object.entries(state.wrongWords).filter(([w,c]) => c > 0);
  if (wrongEntries.length > 0 && Math.random() < 0.35) {
    const [word] = wrongEntries[Math.floor(Math.random() * wrongEntries.length)];
    return WORDS.find(w => w.en === word) || randomWord();
  }
  return randomWord();
}

function randomWord() {
  if (state.usedIndices.length >= WORDS.length) state.usedIndices = [];
  let idx;
  do { idx = Math.floor(Math.random() * WORDS.length); }
  while (state.usedIndices.includes(idx));
  state.usedIndices.push(idx);
  return WORDS[idx];
}

function getWrongOptions(correct, mode) {
  // Prefer same type and nearby level for realistic distractors
  const levels = ['A1','A2','B1','B2'];
  const ci = levels.indexOf(correct.level);
  const nearbyLevels = levels.filter((_,i) => Math.abs(i-ci) <= 1);
  let pool = WORDS.filter(w => w.en !== correct.en && w.type === correct.type && nearbyLevels.includes(w.level));
  if (pool.length < 3) pool = WORDS.filter(w => w.en !== correct.en && w.type === correct.type);
  if (pool.length < 3) pool = WORDS.filter(w => w.en !== correct.en);
  const shuffled = pool.sort(() => Math.random() - 0.5).slice(0, 3);
  return shuffled.map(w => mode === 'en2tr' ? w.tr : w.en);
}

function nextQuestion() {
  state.answered = false;
  document.getElementById('feedbackArea').innerHTML = '';
  document.getElementById('nextBtn').classList.add('invisible');

  state.currentWord = getNextWord();
  state.currentMode = Math.random() < 0.5 ? 'en2tr' : 'tr2en';
  const word = state.currentWord;
  const mode = state.currentMode;

  // Question text
  document.getElementById('levelTag').textContent = word.level;
  document.getElementById('levelTag').className = `level-tag level-${word.level}`;
  document.getElementById('questionType').textContent =
    mode === 'en2tr' ? '🇬🇧 İngilizce → Türkçe' : '🇹🇷 Türkçe → İngilizce';
  document.getElementById('questionWord').textContent =
    mode === 'en2tr' ? word.en : word.tr;
  document.getElementById('questionHint').textContent =
    mode === 'en2tr' ? 'Bu kelimenin Türkçesi nedir?' : 'What is the English of this word?';

  // Re-animate card
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';

  // Options
  const correctAnswer = mode === 'en2tr' ? word.tr : word.en;
  const wrongs = getWrongOptions(word, mode);
  const all = [correctAnswer, ...wrongs].sort(() => Math.random() - 0.5);

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  all.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span>${opt}</span>`;
    btn.onclick = () => handleAnswer(btn, opt, correctAnswer);
    grid.appendChild(btn);
  });

  updateUI();
}

function handleAnswer(btn, chosen, correct) {
  if (state.answered) return;
  state.answered = true;
  state.sessionTotal++;
  state.allTimeTotal++;

  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);

  if (chosen === correct) {
    btn.classList.add('correct');
    state.sessionCorrect++;
    state.allTimeCorrect++;
    // Reduce wrong count
    const w = state.currentWord.en;
    if (state.wrongWords[w] > 0) state.wrongWords[w]--;
    showCorrectFeedback();
  } else {
    btn.classList.add('wrong');
    // Highlight correct
    buttons.forEach(b => {
      if (b.querySelector('span').textContent === correct) b.classList.add('correct');
    });
    const w = state.currentWord.en;
    state.wrongWords[w] = (state.wrongWords[w] || 0) + 1;
    showWrongFeedback();
  }

  saveState();
  updateUI();
  updateWeakWords();

  if (state.sessionTotal >= 10) {
    setTimeout(showCelebration, 1200);
  } else {
    document.getElementById('nextBtn').classList.remove('invisible');
  }
}

async function showCorrectFeedback() {
  const word = state.currentWord;
  const fb = document.getElementById('feedbackArea');
  fb.innerHTML = `
    <div class="feedback-card" id="fbCard">
      <div class="feedback-header">
        <div class="feedback-icon">✅</div>
        <div class="feedback-title correct-text">Doğru! Harika iş! 🎉</div>
      </div>

      </div>
    </div>`;

  const apiKey = localStorage.getItem('wordly_apikey');
  if (!apiKey) {
    document.getElementById('fbCard').innerHTML = `
      <div class="feedback-header">
        <div class="feedback-icon">✅</div>
        <div class="feedback-title correct-text">Doğru! Harika iş! 🎉</div>
      </div>
      <div class="feedback-explanation">
        <strong>"${word.en}"</strong> → <strong>"${word.tr}"</strong> — Bravo! 💜<br><br>
        💡 Akılda kalıcı ipuçları için ayarlardan Groq API key ekle!
      </div>`;
    return;
  }

  try {
    const prompt = `You are a friendly English teacher helping a Turkish learner.
The student correctly answered: "${word.en}" (${word.tr} in Turkish, Level: ${word.level}, Type: ${word.type}).

Respond ONLY in Turkish. Provide:
1. One vivid, natural example sentence in English using "${word.en}", then its Turkish translation.
2. A short, fun memory trick to make this word unforgettable (use rhyme, analogy, imagery, or wordplay).

Format exactly like this (no extra text, no preamble):
SENTENCE: [English sentence] — [Turkish translation]
TIP: [Fun memory trick in Turkish]`;

    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'llama3-8b-8192',
        messages: [{ role: 'user', content: prompt }],
        max_tokens: 200,
        temperature: 0.8
      })
    });

    const data = await res.json();
    const text = data.choices?.[0]?.message?.content || '';
    const sentMatch = text.match(/SENTENCE:\s*(.+)/);
    const tipMatch = text.match(/TIP:\s*(.+)/);
    const sentence = sentMatch ? sentMatch[1].trim() : '';
    const tip = tipMatch ? tipMatch[1].trim() : '';

    document.getElementById('fbCard').innerHTML = `
      <div class="feedback-header">
        <div class="feedback-icon">✅</div>
        <div class="feedback-title correct-text">Doğru! Harika iş! 🎉</div>
      </div>
      ${sentence ? `<div class="feedback-sentence" style="border-left-color:var(--green)">📝 ${sentence}</div>` : ''}
      ${tip ? `<div class="feedback-explanation">🧠 ${tip}</div>` : ''}`;
  } catch(e) {
    document.getElementById('fbCard').innerHTML = `
      <div class="feedback-header">
        <div class="feedback-icon">✅</div>
        <div class="feedback-title correct-text">Doğru! Harika iş! 🎉</div>
      </div>
      <div class="feedback-explanation">
        <strong>"${word.en}"</strong> → <strong>"${word.tr}"</strong> 💜
      </div>`;
  }
}

function showCelebration() {
  const pct = Math.round((state.sessionCorrect / state.sessionTotal) * 100);
  document.getElementById('quizArea').classList.add('hidden');
  document.getElementById('celebrationArea').classList.remove('hidden');

  let emoji, title, msg;
  if (pct === 100) {
    emoji = '🌟'; title = 'Mükemmel!';
    msg = 'Tüm soruları doğru yaptın! Sen bir dahisin 💜';
  } else if (pct >= 70) {
    emoji = '🎉'; title = 'Harika!';
    msg = `${state.sessionCorrect}/${state.sessionTotal} doğru — çok iyi gidiyorsun! Biraz daha pratikle mükemmel olacaksın 💪`;
  } else {
    emoji = '💪'; title = 'İyi Deneme!';
    msg = `${state.sessionCorrect}/${state.sessionTotal} doğru — hata yaptığın kelimeler sana tekrar gelecek. Devam et! 🌸`;
  }

  document.getElementById('celebEmoji').textContent = emoji;
  document.getElementById('celebTitle').textContent = title;
  document.getElementById('celebMsg').textContent = msg;
}

function restartQuiz() {
  state.sessionCorrect = 0;
  state.sessionTotal = 0;
  state.usedIndices = [];
  document.getElementById('celebrationArea').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  nextQuestion();
}

// ──────────────────────────────────────────────
// UI UPDATES
// ──────────────────────────────────────────────
function updateUI() {
  document.getElementById('statCorrect').textContent = state.sessionCorrect;
  document.getElementById('statSession').textContent = state.sessionTotal;
  document.getElementById('statTotal').textContent = state.allTimeTotal;
  document.getElementById('streakNum').textContent = state.streak;

  const pct = state.allTimeTotal > 0
    ? Math.round((state.allTimeCorrect / state.allTimeTotal) * 100) : 0;
  document.getElementById('progressPct').textContent = pct + '%';

  const circumference = 326.7;
  const offset = circumference - (pct / 100) * circumference;
  document.getElementById('ringFill').style.strokeDashoffset = offset;
}

function updateWeakWords() {
  const weak = Object.entries(state.wrongWords)
    .filter(([,c]) => c >= 2)
    .sort((a,b) => b[1]-a[1])
    .slice(0, 8);

  const section = document.getElementById('weakSection');
  const list = document.getElementById('weakList');

  if (weak.length === 0) { section.classList.add('hidden'); return; }
  section.classList.remove('hidden');
  list.innerHTML = weak.map(([w]) => `<span class="weak-chip">${w}</span>`).join('');
}

function openSettings() {
  document.getElementById('apiKeyInput').value = localStorage.getItem('wordly_apikey') || '';

}
function closeSettings() {
  document.getElementById('settingsModal').classList.add('hidden');
}
function saveSettings() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (key) localStorage.setItem('wordly_apikey', key);
  else localStorage.removeItem('wordly_apikey');
  closeSettings();

// Close modal on overlay click
document.getElementById('settingsModal').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});

// ──────────────────────────────────────────────
// SERVICE WORKER + BİLDİRİM
// ──────────────────────────────────────────────
let swReg = null;

async function initSW() {
  if (!('serviceWorker' in navigator)) return;
  // Sadece GitHub Pages gibi gerçek ortamlarda çalış, önizlemede atla
  const isPreview = location.hostname.includes('claudeusercontent') || location.hostname === 'localhost';
  if (isPreview) { console.log('Önizleme ortamı — SW atlandı'); checkNotifBanner(); return; }
  try {
    swReg = await navigator.serviceWorker.register('./sw.js', { scope: './' });
    console.log('SW kayıtlı');
    checkNotifBanner();
    startHourlyCheck();
  } catch(e) {
    console.log('SW hatası:', e);
  }
}

function checkNotifBanner() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    document.getElementById('notifBanner').classList.remove('hidden');
  }
}

async function requestNotifPermission() {
  if (!('Notification' in window)) {
    alert('Tarayıcın bildirim desteklemiyor. Safari ile "Ana Ekrana Ekle" yaptıysan çalışır.');
    return;
  }
  const perm = await Notification.requestPermission();
  document.getElementById('notifBanner').classList.add('hidden');
  if (perm === 'granted') {
    // Test bildirimi gönder
    setTimeout(() => {
      if (swReg) {
        swReg.showNotification('Wordly 💜', {
          body: 'Bildirimler açık! Her gün saat 20:00\'de hatırlatacağım 🌸',
          tag: 'wordly-test',
        });
      }
    }, 1000);
  }
}

// Saatlik kontrol — SW'ye mesaj gönder, o saat 20 ise bildirim atar
function startHourlyCheck() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const sendCheck = () => {
    if (navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage('CHECK_NOTIFICATION');
    }
  };
  sendCheck();
  setInterval(sendCheck, 60 * 60 * 1000); // Her saat
}
